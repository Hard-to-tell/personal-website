media:
  - name: images
    label: 图片
    input: source/images
    output: /images
    rename: safe
    extensions: [png, jpg, jpeg, webp, gif, svg]
  - name: gallery_images
    label: 照片墙图片
    input: source/images/gallery
    output: /images/gallery
    rename: safe
    extensions: [webp]

settings:
  content:
    merge: true
  commit:
    identity: user
    templates:
      create: "新增内容：{path}"
      update: "更新内容：{path}"
      delete: "删除内容：{path}"
      rename: "重命名内容：{oldPath} -> {newPath}"

content:
  - name: posts
    label: 文章
    type: collection
    path: source/_posts
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{hour}{minute}{second}.md"
      field: false
    subfolders: false
    view:
      primary: title
      fields: [title, date, categories, tags]
      sort: date
      order: desc
    fields:
      - name: title
        label: 标题
        type: string
        required: true
        description: 文章显示出来的标题，可以直接写中文。文件名会自动生成，不需要在标题里写英文网址名。
        options:
          maxlength: 120
      - name: date
        label: 发布时间
        type: date
        required: true
        description: 文章按这个时间排序。新文章通常保持默认时间即可；想让旧文章排前面或后面时再改。
        options:
          time: true
          format: yyyy-MM-dd HH:mm:ss
      - name: categories
        label: 分类
        type: string
        list: true
        description: 大分类，建议 1 个就够，例如 日常、读书、建站。留空也可以。
      - name: tags
        label: 标签
        type: string
        list: true
        description: 更细的关键词，可以写多个，例如 Hexo、动画、摘录。留空也可以。
      - name: description
        label: 摘要
        type: text
        description: 首页或搜索里可能显示的短介绍。不会写就留空，正文开头也能承担摘要作用。
      - name: cover
        label: 封面
        type: image
        description: 可选。选择已上传的图片，或上传到 source/images。没有合适图片就留空。
        options:
          media: images
      - name: body
        label: 正文
        type: rich-text
        required: true
        description: 文章正文。可以直接写文字，也可以用 Markdown；需要摘要截断时插入 <!-- more -->。
        options:
          format: markdown
          media: images
          switcher: true

  - name: about
    label: 记录页面
    type: file
    path: source/about/index.md
    format: yaml-frontmatter
    operations:
      delete: false
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: date
        label: 更新时间
        type: date
        options:
          time: true
          format: yyyy-MM-dd HH:mm:ss
      - name: comments
        label: 开启评论
        type: boolean
        default: false
      - name: body
        label: 正文
        type: rich-text
        required: true
        options:
          format: markdown
          media: images
          switcher: true

  - name: gallery
    label: 照片墙
    type: file
    path: source/_data/gallery.yml
    format: yaml
    list: true
    operations:
      delete: false
    fields:
      - name: image
        label: 照片
        type: image
        required: true
        description: 先用本地脚本压成 WebP，再在这里选择或上传到照片墙目录。
        options:
          media: gallery_images
          extensions: [webp]
          rename: safe
      - name: date
        label: 记录日期
        type: date
        required: true
        description: 照片墙会按此日期排列，并自动生成年份筛选。
        options:
          time: false
          format: yyyy-MM-dd
      - name: note
        label: 一句话
        type: text
        description: 可留空；填写后会在鼠标移到照片上时出现。
        options:
          maxlength: 180
      - name: layout
        label: 照片比例
        type: select
        default: portrait
        options:
          values:
            - name: portrait
              label: 竖图
            - name: square
              label: 方图
            - name: landscape
              label: 横图

  - name: friend
    label: 友链页面
    type: file
    path: source/friend/index.md
    format: yaml-frontmatter
    operations:
      delete: false
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: date
        label: 更新时间
        type: date
        options:
          time: true
          format: yyyy-MM-dd HH:mm:ss
      - name: comments
        label: 开启评论
        type: boolean
        default: false
      - name: body
        label: 正文
        type: rich-text
        required: true
        options:
          format: markdown
          media: images
          switcher: true

  - name: message
    label: 留言页面
    type: file
    path: source/message/index.md
    format: yaml-frontmatter
    operations:
      delete: false
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: date
        label: 更新时间
        type: date
        options:
          time: true
          format: yyyy-MM-dd HH:mm:ss
      - name: comments
        label: 开启留言
        type: boolean
        default: true
      - name: body
        label: 说明文字
        type: rich-text
        required: true
        options:
          format: markdown
          media: images
          switcher: true
