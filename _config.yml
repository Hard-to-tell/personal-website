# Site
title: 在流放地
subtitle: ""
description: ""
keywords:
author: Nemo
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://exileland.online
root: /
permalink: posts/:title/
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
ignore:
  # Keep these large originals in Git, but do not copy them into the live site.
  - "**/images/photos/bg2.jpg"
  - "**/images/photos/f2b0edec908bd4010d47e3d5df6fc4613816626.jpg"
  # Gallery originals are converted during every build; only the WebP variants go live.
  - "**/images/gallery/originals/**"
tag_dir: tags
archive_dir: archives
category_dir: categories

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false

# Home page
index_generator:
  path: ""
  per_page: 10
  order_by: -date

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: reimu

search:
  path: search.xml
  field: post
  content: true
  format: html

# Deployment is configured after the hosting account is ready.
deploy:
