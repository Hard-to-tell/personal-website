# Site
title: 在流放地
subtitle: 文章、照片，以及仍在形成的想法
description: 一个安静的个人存档点，收纳文章、照片、阅读与仍在形成的小实验。
keywords:
  - 个人博客
  - 阅读
  - 人工智能
  - 机器人
author: Nemo
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://exileland.online
root: /
permalink: posts/:title/
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
ignore:
  # Keep wallpaper originals in Git, but publish only their optimized WebP copies.
  - "**/images/photos/*.jpg"
  # Gallery originals are converted during every build; only the WebP variants go live.
  - "**/images/gallery/originals/**"
tag_dir: tags
archive_dir: archives
category_dir: categories

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ""
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ""
  wrap: true
  hljs: false

# Home page
index_generator:
  path: ""
  per_page: 10
  order_by: -date

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: reimu

search:
  path: search.xml
  field: post
  content: true
  format: html

# Deployment is configured after the hosting account is ready.
deploy:
